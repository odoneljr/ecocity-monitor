version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ecocity_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ecocity_network

volumes:
  pgdata:
    name: ecocity_pgdata

networks:
  ecocity_network:
    name: ecocity_network
    driver: bridge